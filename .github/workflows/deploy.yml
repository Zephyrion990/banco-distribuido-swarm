name: Pipeline CI/CD Banco Distributed

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir y subir imagen de Docker
        uses: docker/build-push-action@v4
        with:
          context: ./banco-backend  
          push: true
          tags: zephyr199009/banco-backend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Ejecutar comando de actualización en AWS via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            # Actualización progresiva inyectando fecha para obligar el reinicio en Swarm
            sg docker -c "docker service update --env-add DEPLOY_DATE=\$(date +%s) --image zephyr199009/banco-backend:latest mibanco_banco-api"